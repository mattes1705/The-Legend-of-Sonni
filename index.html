<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SONNI RPG</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
}

#map{
  position:relative;
  width:800px;
  height:500px;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  border:4px solid black;
  background:#2e7d32;
}

/* TILE */
.tile{
  position:absolute;
  width:40px;
  height:40px;
}

.grass{background:#43a047;}
.path{background:#a1887f;}
.tree{background:#1b5e20;}

/* PLAYER */
#player{
  position:absolute;
  width:30px;
  height:30px;
  background:gold;
  border:2px solid black;
}

/* NPC */
.npc{
  position:absolute;
  width:30px;
  height:30px;
  border:2px solid black;
}

#emma{background:#a1887f;}
#tim{background:#90caf9;}
#matte{background:#8d6e63;}
#schmyt{background:#ce93d8;}

#dialog{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  background:white;
  border:3px solid black;
  padding:10px;
  display:none;
  white-space:pre-line;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="dialog"></div>

<script>
const map=document.getElementById("map");
const dialog=document.getElementById("dialog");

let player={x:80,y:200};

function drawTile(x,y,type){
  const t=document.createElement("div");
  t.className="tile "+type;
  t.style.left=x+"px";
  t.style.top=y+"px";
  map.appendChild(t);
}

/* MAP BUILD */
for(let y=0;y<12;y++){
  for(let x=0;x<20;x++){

    let type="grass";

    if(y===5) type="path";
    if(x===0||y===0||x===19||y===11) type="tree";

    drawTile(x*40,y*40,type);
  }
}

/* NPCS */
function npc(x,y,id,color){
  const d=document.createElement("div");
  d.className="npc";
  d.style.left=x+"px";
  d.style.top=y+"px";
  d.style.background=color;
  d.id=id;
  map.appendChild(d);
}

npc(320,160,"emma","#a1887f");
npc(200,320,"tim","#90caf9");
npc(120,200,"matte","#8d6e63");
npc(520,120,"schmyt","#ce93d8");

/* PLAYER */
const p=document.createElement("div");
p.id="player";
map.appendChild(p);

function render(){
  p.style.left=player.x+"px";
  p.style.top=player.y+"px";
}
render();

/* MOVE */
function move(dx,dy){
  player.x+=dx;
  player.y+=dy;
  render();
}

/* INTERACT */
function near(ax,ay,bx,by){
  return Math.abs(ax-bx)<40 && Math.abs(ay-by)<40;
}

function show(t){
  dialog.style.display="block";
  dialog.innerText=t;
}

function interact(){

  if(near(player.x,player.y,320,160)){
    show("Emma:\nIch habe meine Sporttasche verloren...");
    return;
  }

  if(near(player.x,player.y,200,320)){
    show("Tim:\nDubai ist schön, aber Dubai mir Baby ist viel schöner");
    return;
  }

  if(near(player.x,player.y,120,200)){
    show("Mattes:\nMore Espresso, less Depresso");
    return;
  }

  if(near(player.x,player.y,520,120)){
    show("Schmyt:\nIch zertret grad nur paar Tulpen im Park");
    return;
  }

  show("Niemand ist hier...");
}

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp")move(0,-10);
  if(e.key==="ArrowDown")move(0,10);
  if(e.key==="ArrowLeft")move(-10,0);
  if(e.key==="ArrowRight")move(10,0);
  if(e.key===" ")interact();
});
</script>

</body>
</html>
