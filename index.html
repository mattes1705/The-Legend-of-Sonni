<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE LEGEND OF SONNI</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  font-family: monospace;
  overflow: hidden;
  touch-action: none;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #2f6b2f;
}

/* PLAYER */
.player {
  position: absolute;
  width: 32px;
  height: 32px;
  background: yellow;
  border: 2px solid black;
  border-radius: 4px;
}

/* NPC */
.npc {
  position: absolute;
  width: 32px;
  height: 32px;
  background: #ff6666;
  border: 2px solid black;
}

/* DIALOG */
#dialog {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: white;
  border-top: 4px solid black;
  padding: 10px;
  display: none;
  font-size: 16px;
}

/* MOBILE CONTROLS */
#controls {
  position: absolute;
  bottom: 140px;
  left: 10px;
}

.btn {
  width: 60px;
  height: 60px;
  margin: 5px;
  background: white;
  border: 2px solid black;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="player" class="player"></div>

  <div id="npc" class="npc" style="left:200px;top:200px;"></div>

  <div id="dialog"></div>

  <div id="controls">
    <button class="btn" onclick="move('up')">⬆️</button><br>
    <button class="btn" onclick="move('left')">⬅️</button>
    <button class="btn" onclick="move('down')">⬇️</button>
    <button class="btn" onclick="move('right')">➡️</button><br>
    <button class="btn" onclick="interact()">A</button>
  </div>
</div>

<script>
const player = document.getElementById("player");
const npc = document.getElementById("npc");
const dialog = document.getElementById("dialog");

let x = 50;
let y = 50;

function render() {
  player.style.left = x + "px";
  player.style.top = y + "px";
}
render();

function move(dir) {
  const speed = 10;

  if (dir === "up") y -= speed;
  if (dir === "down") y += speed;
  if (dir === "left") x -= speed;
  if (dir === "right") x += speed;

  render();
}

function interact() {
  const px = x;
  const py = y;
  const nx = parseInt(npc.style.left);
  const ny = parseInt(npc.style.top);

  const dist = Math.abs(px - nx) + Math.abs(py - ny);

  if (dist < 60) {
    dialog.style.display = "block";
    dialog.innerText =
      "Professor Rizz:\n\nSaria...\nDie Zeit ist gekommen.\nFinde die 4 Fragmente des Zauberspruchs.";
  } else {
    dialog.style.display = "block";
    dialog.innerText = "Niemand ist hier...";
  }
}

// Keyboard support
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") move("up");
  if (e.key === "ArrowDown") move("down");
  if (e.key === "ArrowLeft") move("left");
  if (e.key === "ArrowRight") move("right");
  if (e.key === " ") interact();
});
</script>

</body>
</html>

  <div id="player"></div>

  <!-- WALLS -->
  <div class="wall" style="left:0;top:0;width:100%;height:20px;"></div>
  <div class="wall" style="left:0;top:0;width:20px;height:100%;"></div>
  <div class="wall" style="left:0;bottom:0;width:100%;height:20px;"></div>
  <div class="wall" style="right:0;top:0;width:20px;height:100%;"></div>

  <div id="dialog"></div>

  <div id="inventory">
    🎒 Inventar:<br>
    <span id="invText">leer</span>
  </div>

  <div id="controls">
    <button class="btn" onclick="move(0,-10)">⬆️</button><br>
    <button class="btn" onclick="move(-10,0)">⬅️</button>
    <button class="btn" onclick="move(0,10)">⬇️</button>
    <button class="btn" onclick="move(10,0)">➡️</button><br>
    <button class="btn" onclick="interact()">A</button>
  </div>

</div>

<script>
const player = document.getElementById("player");
const dialog = document.getElementById("dialog");
const invText = document.getElementById("invText");
const bag = document.getElementById("bag");

let x = 50, y = 50;

let inventory = [];

function render() {
  player.style.left = x + "px";
  player.style.top = y + "px";
}
render();

function move(dx, dy) {
  x += dx;
  y += dy;
  render();
}

function show(text) {
  dialog.style.display = "block";
  dialog.innerText = text;
}

function hide() {
  dialog.style.display = "none";
}

function addItem(item) {
  inventory.push(item);
  invText.innerHTML = inventory.join("<br>");
}

/* COLLISION CHECK */
function near(a, b, dist=40) {
  const ax = a.x, ay = a.y;
  const bx = b.x, by = b.y;
  return Math.abs(ax-bx) < dist && Math.abs(ay-by) < dist;
}

function interact() {

  const px = x;
  const py = y;

  // EMMA
  const emma = {x:220,y:180};
  if (near({x:px,y:py}, emma)) {
    if (inventory.includes("🎒 Sporttasche")) {
      show("Emma:\n\nDanke!");
      inventory = inventory.filter(i => i !== "🎒 Sporttasche");
      invText.innerHTML = inventory.join("<br>");
    } else {
      show("Emma:\n\nIch habe meine Sporttasche verloren...");
    }
    return;
  }

  // TIM
  const tim = {x:120,y:320};
  if (near({x:px,y:py}, tim)) {
    show("Tim:\n\nDubai ist schön, aber Dubai mir Baby ist viel schöner");
    return;
  }

  // MATTES
  const matte = {x:300,y:350};
  if (near({x:px,y:py}, matte)) {
    show("Mattes:\n\nMore Espresso,\nless Depresso");
    return;
  }

  // SCHMYT
  const schmyt = {x:420,y:250};
  if (near({x:px,y:py}, schmyt)) {
    show("Schmyt:\n\nIch zertret grad nur paar Tulpen im Park");
    return;
  }

  // ITEM BAG
  const bx = 250, by = 220;
  if (Math.abs(px-bx)<30 && Math.abs(py-by)<30) {
    if (!inventory.includes("🎒 Sporttasche")) {
      addItem("🎒 Sporttasche");
      bag.style.display = "none";
      show("Du hast eine Sporttasche gefunden!");
    }
    return;
  }

  show("Niemand ist hier...");
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") move(0,-10);
  if (e.key === "ArrowDown") move(0,10);
  if (e.key === "ArrowLeft") move(-10,0);
  if (e.key === "ArrowRight") move(10,0);
  if (e.key === " ") interact();
});
</script>

</body>

let bagTaken = false;

  player.style.left=x+"px";
  player.style.top=y+"px";

  render();

  dialog.innerText=t;

  inv.innerHTML = inventory.join("<br>");

function addFragment(f){
  if(!inventory.includes(f)){
    inventory.push(f);
    updateInv();
  }
}

    else if(!inventory.includes("SCHWIMMEN")) addFragment("SCHWIMMEN");

    else if(!inventory.includes("OBEN")) addFragment("OBEN");
  }

  show("Niemand ist hier...");
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp")move(0,-10);
  if(e.key==="ArrowDown")move(0,10);
  if(e.key==="ArrowLeft")move(-10,0);
  if(e.key==="ArrowRight")move(10,0);

});

    window.mineCount=0;
  }

  if(type==="field"){
    minigame.innerHTML=`
      <h2>🌾 Feld</h2>
      <p>Klicke 5x schnell auf ernten</p>
      <button onclick="farm()">ernten</button>
      <p id="fcount">0/5</p>
    `;
    window.farmCount=0;
  }

  if(type==="dice"){
    const roll=Math.floor(Math.random()*20)+1;
    let res = roll>=15 ? "AM BESTEN" : "fail";

    minigame.innerHTML=`
      <h2>🎲 W20</h2>
      <p>Du würfelst: ${roll}</p>
      <button onclick="closeMG('${res}')">weiter</button>
    `;
  }
}

function mine(){
  window.mineCount++;
  document.getElementById("mcount").innerText=window.mineCount+"/5";
  if(window.mineCount>=5) closeMG("ENTEN");
}

function farm(){
  window.farmCount++;
  document.getElementById("fcount").innerText=window.farmCount+"/5";
  if(window.farmCount>=5) closeMG("SCHWIMMEN");
}

function closeMG(res){
  minigame.style.display="none";
  if(res!=="fail") add(res);
}

/* BOSS */
function boss(){
  minigame.style.display="block";

  let q=0;

  const questions=[
    {
      q:"Auf welchen Song spielt Schmyt an?",
      a1:"Mach kaputt",
      a2:"Ich wünschte, du wärst verloren",
      correct:2
    },
    {
      q:"Wer ist ein dreibeiniger Kanalreiniger?",
      a1:"Tim",
      a2:"SSIO",
      correct:2
    },
    {
      q:"Wer hat Maximum Rizz?",
      a1:"Ski Aggu",
      a2:"Saria",
      correct:2
    }
  ];

  function renderQ(){
    const o=questions[q];
    minigame.innerHTML=`
      <h2>🎧 DJ BOSS</h2>
      <p>${o.q}</p>
      <button onclick="ans(1)">${o.a1}</button>
      <button onclick="ans(2)">${o.a2}</button>
    `;
  }

  window.ans=function(i){
    if(i===questions[q].correct){
      q++;
      if(q>=3){
        closeMG("OBEN");
        add("OBEN");
        end();
      } else renderQ();
    } else {
      renderQ();
    }
  }

  renderQ();
}

/* END */
function end(){
  alert("ENTEN SCHWIMMEN AM BESTEN OBEN\nZeige das Passwort dem Hüter des Schatzes");
}

/* INTERACT */
function interact(){

  if(near(220,180)){
    show("Emma:\n\nIch habe meine Sporttasche verloren...");
    return;
  }

  if(near(120,300)){
    show("Tim:\n\nDubai ist schön, aber Dubai mir Baby ist viel schöner");
    return;
  }

  if(near(300,340)){
    show("Mattes:\n\nMore Espresso,\nless Depresso");
    return;
  }

  if(near(420,220)){
    show("Schmyt:\n\nIch zertret grad nur paar Tulpen im Park");
    return;
  }

  // MINIGAME TRIGGERS (simple zones)
  if(x>350 && y<200){
    openMinigame("mine");
    return;
  }

  if(x<200 && y>250){
    openMinigame("field");
    return;
  }

  if(x>350 && y>250){
    openMinigame("dice");
    return;
  }

  if(x>400 && y<120){
    boss();
    return;
  }

  show("Niemand ist hier...");
}

/* MOVE */
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp")move(0,-10);
  if(e.key==="ArrowDown")move(0,10);
  if(e.key==="ArrowLeft")move(-10,0);
  if(e.key==="ArrowRight")move(10,0);
  if(e.key===" ")interact();
});

</script>
